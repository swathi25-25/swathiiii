<script>
let timer,timeLeft=60,score=0,total=0,used=[],current=null,dismissed=false;

/* 🔥 COMPLETE INTERVIEW QUESTION BANK */
const questionBank={

"Software Engineer":[
{q:"Explain OOPS principles.",k:["encapsulation","inheritance","polymorphism","abstraction"]},
{q:"What is REST API?",k:["api","http","client","server"]},
{q:"Explain multithreading.",k:["thread","parallel","process"]},
{q:"How do you handle deadlines?",k:["time","priority","management"]},
{q:"Tell me about yourself.",k:["experience","skills","education"]}
],

"Data Scientist":[
{q:"What is overfitting?",k:["model","training","test"]},
{q:"Explain bias vs variance.",k:["bias","variance"]},
{q:"What is regression?",k:["prediction","model","data"]},
{q:"Describe your ML project.",k:["model","data","result"]},
{q:"Why Data Science?",k:["analysis","data","insight"]}
],

"Cloud Engineer":[
{q:"What is cloud computing?",k:["cloud","internet","server"]},
{q:"Explain IaaS PaaS SaaS.",k:["iaas","paas","saas"]},
{q:"What is load balancing?",k:["traffic","server","distribution"]},
{q:"How do you manage failures?",k:["backup","recovery"]},
{q:"Describe your cloud project.",k:["deployment","service"]}
],

"Cyber Security":[
{q:"What is phishing?",k:["attack","email","fraud"]},
{q:"Explain firewall.",k:["network","security","filter"]},
{q:"What is encryption?",k:["data","security","key"]},
{q:"How to secure web apps?",k:["authentication","validation","security"]},
{q:"How do you handle breaches?",k:["incident","response","recovery"]}
],

"Digital Marketing":[
{q:"What is SEO?",k:["search","engine","optimization"]},
{q:"Explain social media strategy.",k:["content","audience","engagement"]},
{q:"What is PPC?",k:["ads","click","campaign"]},
{q:"How do you measure campaign success?",k:["analytics","roi","conversion"]},
{q:"Why marketing?",k:["brand","growth","customer"]}
],

"HR Manager":[
{q:"What is recruitment process?",k:["interview","selection","hiring"]},
{q:"How do you resolve conflicts?",k:["communication","resolution"]},
{q:"How do you motivate employees?",k:["motivation","team","performance"]},
{q:"Describe leadership style.",k:["leadership","team"]},
{q:"Why HR?",k:["people","management"]}
],

"Teacher":[
{q:"How do you handle weak students?",k:["support","improve","guidance"]},
{q:"What is your teaching method?",k:["interactive","learning","student"]},
{q:"How do you manage classroom?",k:["discipline","control"]},
{q:"Why teaching profession?",k:["education","students","passion"]},
{q:"How do you evaluate students?",k:["assessment","performance"]}
],

"Mechanical Engineer":[
{q:"What is thermodynamics?",k:["energy","heat","system"]},
{q:"Explain IC engine.",k:["engine","fuel","combustion"]},
{q:"What is CAD?",k:["design","model"]},
{q:"Describe your project.",k:["design","implementation"]},
{q:"Why mechanical field?",k:["machines","engineering"]}
],

"Civil Engineer":[
{q:"What is concrete mix ratio?",k:["cement","sand","aggregate"]},
{q:"Explain load types in buildings.",k:["dead","live","load"]},
{q:"What is soil testing?",k:["soil","foundation"]},
{q:"Describe site management.",k:["planning","construction"]},
{q:"Why civil engineering?",k:["infrastructure","construction"]}
],

"Banking":[
{q:"What is inflation?",k:["price","increase","economy"]},
{q:"Explain balance sheet.",k:["assets","liabilities"]},
{q:"What is RBI role?",k:["reserve","bank","regulation"]},
{q:"Why banking sector?",k:["finance","service"]},
{q:"How do you handle customers?",k:["service","communication"]}
],

"Doctor":[
{q:"What is diagnosis?",k:["disease","symptoms"]},
{q:"How do you handle emergency cases?",k:["emergency","treatment"]},
{q:"What is patient care?",k:["care","treatment"]},
{q:"Why medical profession?",k:["health","service"]},
{q:"How do you manage stress?",k:["calm","focus"]}
],

"Entrepreneur":[
{q:"What is business model?",k:["revenue","strategy"]},
{q:"How do you handle risks?",k:["risk","planning"]},
{q:"Explain startup funding.",k:["investment","capital"]},
{q:"Describe your business idea.",k:["market","solution"]},
{q:"Why entrepreneurship?",k:["innovation","growth"]}
]
};

/* START INTERVIEW */
function startInterview(){
if(dismissed){alert("You are DISMISSED ❌");return;}

let role=document.getElementById("roleSelect").value;
let list=questionBank[role];
let available=list.filter(x=>!used.includes(x.q));

if(available.length==0){
document.getElementById("questionBox").innerHTML="Interview Completed ✅";
return;
}

current=available[Math.floor(Math.random()*available.length)];
used.push(current.q);
total++;

document.getElementById("questionBox").innerHTML="<b>Question:</b> "+current.q;
document.getElementById("answerBox").value="";
document.getElementById("resultBox").innerHTML="";

speakText(current.q);
startTimer();
}

/* TEXT TO SPEECH */
function speakText(text){
let speech=new SpeechSynthesisUtterance(text);
speech.lang="en-US";
window.speechSynthesis.speak(speech);
}

/* TIMER */
function startTimer(){
clearInterval(timer);
timeLeft=60;
updateTimer();
timer=setInterval(()=>{
timeLeft--;
updateTimer();
if(timeLeft<=0){
clearInterval(timer);
submitAnswer();
}
},1000);
}

function updateTimer(){
document.getElementById("timer").innerHTML="Time: "+timeLeft+"s";
}

/* MICROPHONE */
function startRecording(){
if(!('webkitSpeechRecognition'in window)){
alert("Use Chrome Browser");
return;
}
let recognition=new webkitSpeechRecognition();
recognition.lang="en-US";
recognition.start();
recognition.onresult=function(event){
document.getElementById("answerBox").value=event.results[0][0].transcript;
};
}

/* SUBMIT & EVALUATE */
function submitAnswer(){
if(dismissed||!current)return;
clearInterval(timer);

let ans=document.getElementById("answerBox").value.toLowerCase();
let result=document.getElementById("resultBox");

if(ans.length<20){
result.style.background="#8B0000";
result.innerHTML="Answer too short ❌";
return;
}

/* RELEVANCE CHECK */
let match=false;
current.k.forEach(word=>{
if(ans.includes(word))match=true;
});

if(!match){
dismissed=true;
result.style.background="#8B0000";
result.innerHTML="<b>DISMISSED ❌</b><br>Answer not relevant.";
document.getElementById("scoreBoard").innerHTML="Status: Dismissed";
return;
}

/* GRADING + FEEDBACK */
let grade,points,feedback;

if(ans.length>180){
grade="A+";
points=10;
feedback="Outstanding answer! Strong technical depth and structured explanation.";
}
else if(ans.length>120){
grade="A";
points=8;
feedback="Very good answer. Add real-world examples for more impact.";
}
else if(ans.length>70){
grade="B";
points=6;
feedback="Good attempt. Try explaining concepts more clearly.";
}
else{
grade="C";
points=4;
feedback="Basic explanation. Add more technical details.";
}

score+=points;

result.style.background="#004d40";
result.innerHTML="<b>Grade:</b> "+grade+
"<br><b>Feedback:</b> "+feedback;

document.getElementById("scoreBoard").innerHTML=
"Score: "+score+" | Questions: "+total;
}
</script>
